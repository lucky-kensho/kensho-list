    color: #333;
    font-size: 15px;

  header {

    cursor: pointer;

  .tabs {

    gap: 3px;
    padding-top: 10px;

    color: rgba(255,255,255,0.85);

    padding: 9px 2px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 8px 8px 0 0;

    background: white;
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    transition: opacity 0.3s, transform 0.3s;
    position: relative;
  }
  .card.done { opacity: 0.4; }
  .card.removing { transform: translateX(110%); opacity: 0; }
  .card-inner { display: flex; align-items: stretch; }
  .check-area {
    width: 52px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    border-right: 1px solid #f0f0f0;
    background: #fafafa;
    -webkit-tap-highlight-color: transparent;
  }
  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
  }
  .card.done .check-circle {
    background: #27ae60;
    border-color: #27ae60;
    color: white;
  }
  .card-body {
    flex: 1;
    padding: 10px 38px 10px 11px;
    min-width: 0;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 7px;
    gap: 6px;
  }
  .maker-name {
    font-weight: bold;
    font-size: 14px;
    line-height: 1.3;
    flex: 1;
  }
  .card.done .maker-name { text-decoration: line-through; color: #bbb; }
  .deadline-badge {
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .dl-red    { background: #fde8e8; color: #c0392b; }
  .dl-yellow { background: #fef9e7; color: #c87941; }
  .dl-green  { background: #eafaf1; color: #1e8449; }
  .dl-gray   { background: #f0f0f0; color: #888; }
  .buy-box {
    background: #fff8e1;
    border-left: 3px solid #f39c12;
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 7px;
    font-size: 13px;
    line-height: 1.5;
    color: #444;
  }
  .buy-label {
    font-size: 10px;
    color: #bbb;
    font-weight: bold;
    letter-spacing: 0.4px;
    margin-bottom: 1px;

  .card-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

    background: #eaf4fb;
    color: #1a5276;
    border-radius: 20px;
    padding: 2px 8px;

    align-items: center;
    font-size: 11px;
    background: #e8f0fe;
    color: #1a56db;
    border-radius: 20px;
    padding: 3px 10px;
    text-decoration: none;
    white-space: nowrap;
    font-weight: bold;
    flex-shrink: 0;

    font-size: 10px;
    border-radius: 20px;
    padding: 1px 7px;
    margin-bottom: 3px;
    display: inline-block;
  }

  .cat-daily { background: #f4ecf7; color: #6c3483; }

    position: absolute;
    top: 9px;
    right: 9px;
    width: 26px;
    height: 26px;

    color: #e74c3c;
    border: none;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 11px;
    font-weight: bold;

  .exclusion-body.open { display: block; }

    box-sizing: border-box;
    background: rgba(255,255,255,0.9);
    color: #333;
  }

    display: inline-block;
    font-size: 10px;
    background: rgba(231,76,60,0.15);
    color: #c0392b;
    border-radius: 4px;
    padding: 1px 6px;

    border-radius: 12px;

    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-tap-highlight-color: transparent;

    justify-content: center;
    padding: 20px;
    box-sizing: border-box;

    font-size: 14px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 1px 3px;
    flex-shrink: 0;
    color: #ccc;

    line-height: 1;

    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 1px 3px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;

    background: #fff3cd;

    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 5px;
    font-weight: bold;
    vertical-align: middle;

<body>

<header>
  <div class="header-top">
    <h1>🛒 懸賞買い物リスト</h1>
    <button class="reset-btn" onclick="resetAll()">↩ リセット</button>
  </div>
  <div class="header-date">2026年5月28日更新　全225件</div>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab('may',this)">🗓 5月</button>
    <button class="tab-btn" onclick="switchTab('store',this)">店舗</button>
    <button class="tab-btn" onclick="switchTab('maker',this)">食品・日用品</button>
    <button class="tab-btn" onclick="switchTab('pin',this)">⭐ ピン</button>
    <button class="tab-btn" onclick="switchTab('unknown',this)">❓ 不明</button>
    <button class="tab-btn active" onclick="switchTab('memo',this)">メモ</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 キーワードで検索（メーカー・商品・賞品など）" oninput="onSearchInput(this.value)" autocomplete="off">
  </div>
</header>

<div class="count-bar">
  <span>このタブ残り <strong id="remaining">0</strong> 件</span>
  <span style="color:#ccc;font-size:11px;">✅ チェック ／ ✕ 削除</span>
</div>

<div id="tab-may"     class="tab-content"></div>
<div id="tab-unknown" class="tab-content"></div>
<div id="tab-store"  class="tab-content"></div>
<div id="tab-maker"  class="tab-content"></div>
<div id="tab-pin"    class="tab-content"></div>
<div id="tab-memo"   class="tab-content active">
  <div style="padding:8px 0 12px;">
    <button onclick="toggleMemoForm()" style="width:100%;padding:12px;border:2px dashed #ddd;border-radius:12px;background:white;color:#999;font-size:14px;cursor:pointer;font-family:inherit;">＋ 追加</button>
  </div>
  <div id="memo-form-area" style="display:none;background:white;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 5px rgba(0,0,0,0.08);">
    <div style="margin-bottom:8px;">
      <div style="font-size:11px;color:#bbb;font-weight:bold;margin-bottom:4px;letter-spacing:0.4px;">タイトル（例: いなげや）</div>
      <input id="memo-title-input" type="text" placeholder="タイトル" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#bbb;font-weight:bold;margin-bottom:4px;letter-spacing:0.4px;">メモ</div>
      <textarea id="memo-text-input" placeholder="メモを入力" rows="3" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;"></textarea>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="memo-submit-btn" onclick="submitMemo()" style="flex:1;padding:10px;background:#e74c3c;color:white;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;">追加する</button>
      <button onclick="toggleMemoForm()" style="padding:10px 14px;background:#f0f0f0;color:#888;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;">キャンセル</button>
    </div>
  </div>
  <div id="memo-list"></div>
</div>

<div id="tab-search" class="tab-content"></div>

<div id="card-edit-overlay" class="card-edit-overlay" onclick="if(event.target===this)closeCardEdit()">
  <div class="card-edit-box">
    <div style="font-weight:bold;font-size:16px;margin-bottom:14px;">📝 カード情報を編集</div>
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#bbb;font-weight:bold;margin-bottom:4px;letter-spacing:0.4px;">締切（例: 5/31）</div>
      <input id="edit-deadline" type="text" placeholder="5/31" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#bbb;font-weight:bold;margin-bottom:4px;letter-spacing:0.4px;">🛍 何を買う？</div>
      <textarea id="edit-buy" rows="3" placeholder="購入条件を入力" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;resize:vertical;"></textarea>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:11px;color:#bbb;font-weight:bold;margin-bottom:4px;letter-spacing:0.4px;">応募URL</div>
      <input id="edit-url" type="url" placeholder="https://..." style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="saveCardEdit()" style="flex:1;padding:10px;background:#e74c3c;color:white;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;">保存</button>
      <button onclick="closeCardEdit()" style="padding:10px 14px;background:#f0f0f0;color:#888;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;">キャンセル</button>
    </div>
  </div>
</div>

<div class="exclusion-section" id="exclusion-section" style="display:none">
  <div class="exclusion-header" onclick="toggleExclusion()">
    <span>🗑 除外リスト（削除済みアイテム）</span>
    <span id="excl-arrow">▶</span>
  </div>
  <div class="exclusion-body" id="exclusion-body"></div>
</div>

function saveState() {

}

const LOCAL_EDITS_KEY = 'kenshow_edits_v1';
let localEdits = {};
try { localEdits = JSON.parse(localStorage.getItem(LOCAL_EDITS_KEY)) || {}; } catch(e) {}

function saveLocalEdits() {
  try { localStorage.setItem(LOCAL_EDITS_KEY, JSON.stringify(localEdits)); } catch(e) {}
}

function calcDlClass(s) {
  const m = String(s||'').match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return 'dl-gray';
  try {
    const today = new Date(); today.setHours(0,0,0,0);
    let dl = new Date(today.getFullYear(), m[1]-1, +m[2]);
    if (dl < today) dl = new Date(today.getFullYear()+1, m[1]-1, +m[2]);
    const days = Math.round((dl-today)/86400000);
    if (days<=7) return 'dl-red'; if (days<=30) return 'dl-yellow'; return 'dl-green';
  } catch(e) { return 'dl-gray'; }
}

function getEff(item) {
  const e = localEdits[item.id];
  if (!e) return item;
  const r = Object.assign({}, item);
  if (e.deadline) { r.deadline = e.deadline; r.dlClass = calcDlClass(e.deadline); }
  if (e.buy)      r.buy = e.buy;
  if (e.url !== undefined) r.url = e.url;
  return r;
}

let editingCardId = null;
function openCardEdit(id) {
  editingCardId = id;
  const item = allItems[id];
  const e = localEdits[id] || {};
  document.getElementById('edit-deadline').value = e.deadline || item.deadline || '';
  document.getElementById('edit-buy').value = e.buy !== undefined ? e.buy : (item.buy || '');
  document.getElementById('edit-url').value = e.url !== undefined ? e.url : (item.url || '');
  document.getElementById('card-edit-overlay').classList.add('open');
  setTimeout(() => document.getElementById('edit-deadline').focus(), 80);
}
function closeCardEdit() {
  document.getElementById('card-edit-overlay').classList.remove('open');
  editingCardId = null;
}
function saveCardEdit() {
  if (!editingCardId) return;
  const dl  = document.getElementById('edit-deadline').value.trim();
  const buy = document.getElementById('edit-buy').value.trim();
  const url = document.getElementById('edit-url').value.trim();
  const prev = localEdits[editingCardId] || {};
  const e = {};
  if (dl)  e.deadline = dl;
  if (buy) e.buy = buy;
  if (url) e.url = url; else if ('url' in prev) e.url = '';
  if (Object.keys(e).length) localEdits[editingCardId] = e;
  else delete localEdits[editingCardId];
  saveLocalEdits();
  closeCardEdit();
  renderAll();
}

function updateCount(tabId) {
  if (tabId === 'memo') { updateMemoCount(); return; }
  if (tabId === 'pin') {
    const n = Object.values(allData).flat().filter(i => pinned[i.id] && state[i.id] !== 'deleted' && state[i.id] !== 'done').length;
    document.getElementById('remaining').textContent = n;
    return;
  }
  if (tabId === 'may') {
    const _ct = new Date(); _ct.setHours(0,0,0,0);
    const n = Object.values(allData).flat().filter(i => {
      if (state[i.id] === 'deleted' || state[i.id] === 'done') return false;
      const dl = getEff(i).deadline;
      if (!String(dl||'').startsWith('5/')) return false;
      const day = parseInt((String(dl).split('/')[1])||'0') || 0;
      return new Date(_ct.getFullYear(), 4, day) >= _ct;
    }).length;
    document.getElementById('remaining').textContent = n;
    return;
  }
  if (tabId === 'unknown') {
    const n = Object.values(allData).flat().filter(i => {
      if (state[i.id] === 'deleted' || state[i.id] === 'done') return false;
      return !String(getEff(i).deadline||'').match(/\d{1,2}\/\d{1,2}/);
    }).length;
    document.getElementById('remaining').textContent = n;
    return;
  }
  const items = allData[tabId];
  if (!items) { document.getElementById('remaining').textContent = 0; return; }
  const n = items.filter(i => state[i.id] !== 'deleted' && state[i.id] !== 'done').length;
  document.getElementById('remaining').textContent = n;
}

function renderAll() {
  ['store','maker'].forEach(t => renderTab(t));
  renderPinnedTab();
  renderMayTab();
  renderUnknownTab();
  renderMemoList();
  updateCount(currentTab);
  renderExclusion();
}

function toggleDone(id, tabId) {
  state[id] = state[id] === 'done' ? undefined : 'done';
  saveState();
  if (tabId === 'may') { renderMayTab(); }
  else if (tabId === 'unknown') { renderUnknownTab(); }
  else { renderTab(tabId); }
  const sq = document.getElementById('search-input').value.trim();
  if (sq) { renderSearch(sq); } else { updateCount(tabId); }
}

function deleteItem(id, tabId) {
  const cardId = tabId === 'may' ? 'may-card-' + id
               : tabId === 'unknown' ? 'unk-card-' + id
               : tabId === 'search'  ? 's-card-' + id
               : 'card-' + id;
  const card = document.getElementById(cardId);
  if (card) {
    card.classList.add('removing');
    setTimeout(() => {
      state[id] = 'deleted';
      saveState();
      if (tabId === 'search') {
        const sq = document.getElementById('search-input').value.trim();
        if (sq) renderSearch(sq);
        updateCount(currentTab);
      } else if (tabId === 'may') { renderMayTab(); updateCount('may'); }
      else if (tabId === 'unknown') { renderUnknownTab(); updateCount('unknown'); }
      else { renderTab(tabId); updateCount(tabId); }
      renderExclusion();
    }, 280);
  }
}

function restoreItem(id) {
  delete state[id];
  saveState();
  renderAll();
}

function renderExclusion() {
  const deleted = Object.entries(state).filter(([,v]) => v === 'deleted');
  const section = document.getElementById('exclusion-section');
  const body = document.getElementById('exclusion-body');
  if (deleted.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  let html = '';
  deleted.forEach(([id]) => {
    const item = allItems[id];
    if (!item) return;
    const label = (item.store || item.category || '') + ' × ' + item.maker;
    html += `<div class="excl-item"><span class="excl-label">🗑 ${label}</span><button class="restore-btn" onclick="restoreItem('${id}')">戻す</button></div>`;
  });
  body.innerHTML = html;
}

function toggleExclusion() {
  exclOpen = !exclOpen;
  document.getElementById('exclusion-body').classList.toggle('open', exclOpen);
  document.getElementById('excl-arrow').textContent = exclOpen ? '▼' : '▶';
}

function switchTab(tabId, btn) {
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  btn.classList.add('active');
  currentTab = tabId;
  updateCount(tabId);
}

function resetAll() {
  if (confirm('全タブをリセットしますか？\n（チェックと削除がすべて元に戻ります）')) {
    try { localStorage.removeItem(STATE_KEY); } catch(e) {}
    state = {};
    renderAll();
  }
}

// ===== 買い物メモ =====
const MEMO_KEY = 'kenshow_memo_v1';
let memoItems = [];
try { memoItems = JSON.parse(localStorage.getItem(MEMO_KEY)) || []; } catch(e) {}
let memoNextId = memoItems.length > 0 ? Math.max(...memoItems.map(i => i.id)) + 1 : 1;
let editingMemoId = null;

function saveMemo() {
  try { localStorage.setItem(MEMO_KEY, JSON.stringify(memoItems)); } catch(e) {}
}

function renderMemoList() {
  const container = document.getElementById('memo-list');
  if (!container) return;
  const active = memoItems.filter(i => !i.deleted);
  if (active.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📝</div>買い物メモがありません<br><small style="font-size:12px">＋ 追加から登録できます</small></div>';
    updateMemoCount();
    return;
  }
  let html = '';
  active.forEach(item => {
    const isDone = item.done;
    const memoLines = (item.memo || '').replace(/\n/g, '<br>');
    html += `
      <div class="card${isDone ? ' done' : ''}" id="memo-card-${item.id}">
        <div class="card-inner">
          <div class="check-area" onclick="toggleMemoDone(${item.id})">
            <div class="check-circle">${isDone ? '✓' : ''}</div>
          </div>
          <div class="card-body">
            <div class="card-top">
              <div class="maker-name">${item.title || '無題'}</div>
            </div>
            ${item.memo ? `<div class="buy-box"><div class="buy-label">📋 メモ</div>${memoLines}</div>` : ''}
            <div style="display:flex;justify-content:flex-end;gap:5px;padding-top:6px;">
              <button onclick="moveMemoUp(${item.id})" style="font-size:13px;background:#f0f0f0;color:#555;border:none;border-radius:8px;width:34px;height:28px;cursor:pointer;font-family:inherit;line-height:1;">↑</button>
              <button onclick="moveMemoDown(${item.id})" style="font-size:13px;background:#f0f0f0;color:#555;border:none;border-radius:8px;width:34px;height:28px;cursor:pointer;font-family:inherit;line-height:1;">↓</button>
              <button onclick="editMemo(${item.id})" style="font-size:12px;background:#f0f0f0;color:#666;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;">✏️ 編集</button>
            </div>
          </div>
        </div>
        <button class="delete-btn" onclick="deleteMemoItem(${item.id})" title="削除">✕</button>
      </div>`;
  });
  container.innerHTML = html;
  updateMemoCount();
}

function updateMemoCount() {
  if (currentTab !== 'memo') return;
  const n = memoItems.filter(i => !i.deleted && !i.done).length;
  document.getElementById('remaining').textContent = n;
}

function toggleMemoForm() {
  const form = document.getElementById('memo-form-area');
  const opening = form.style.display === 'none';
  form.style.display = opening ? 'block' : 'none';
  if (opening) { setTimeout(() => document.getElementById('memo-title-input').focus(), 50); }
  else {
    document.getElementById('memo-title-input').value = '';
    document.getElementById('memo-text-input').value = '';
    editingMemoId = null;
    document.getElementById('memo-submit-btn').textContent = '追加する';
  }
}

function editMemo(id) {
  const item = memoItems.find(i => i.id === id);
  if (!item) return;
  editingMemoId = id;
  document.getElementById('memo-title-input').value = item.title || '';
  document.getElementById('memo-text-input').value = item.memo || '';
  document.getElementById('memo-submit-btn').textContent = '更新する';
  document.getElementById('memo-form-area').style.display = 'block';
  setTimeout(() => document.getElementById('memo-title-input').focus(), 50);
}

function submitMemo() {
  const title = document.getElementById('memo-title-input').value.trim();
  const memo  = document.getElementById('memo-text-input').value.trim();
  if (!title && !memo) return;
  if (editingMemoId !== null) {
    const item = memoItems.find(i => i.id === editingMemoId);
    if (item) { item.title = title; item.memo = memo; }
    editingMemoId = null;
    document.getElementById('memo-submit-btn').textContent = '追加する';
  } else {
    memoItems.push({ id: memoNextId++, title, memo, done: false, deleted: false });
  }
  saveMemo();
  document.getElementById('memo-title-input').value = '';
  document.getElementById('memo-text-input').value = '';
  document.getElementById('memo-form-area').style.display = 'none';
  renderMemoList();
}

function toggleMemoDone(id) {
  const item = memoItems.find(i => i.id === id);
  if (item) { item.done = !item.done; saveMemo(); renderMemoList(); }
}

function moveMemoUp(id) {
  const active = memoItems.filter(i => !i.deleted);
  const ai = active.findIndex(i => i.id === id);
  if (ai <= 0) return;
  const ia = memoItems.findIndex(i => i.id === id);
  const ib = memoItems.findIndex(i => i.id === active[ai - 1].id);
  [memoItems[ia], memoItems[ib]] = [memoItems[ib], memoItems[ia]];
  saveMemo(); renderMemoList();
}

function moveMemoDown(id) {
  const active = memoItems.filter(i => !i.deleted);
  const ai = active.findIndex(i => i.id === id);
  if (ai >= active.length - 1) return;
  const ia = memoItems.findIndex(i => i.id === id);
  const ib = memoItems.findIndex(i => i.id === active[ai + 1].id);
  [memoItems[ia], memoItems[ib]] = [memoItems[ib], memoItems[ia]];
  saveMemo(); renderMemoList();
}

function deleteMemoItem(id) {
  const card = document.getElementById('memo-card-' + id);
  if (card) {
    card.classList.add('removing');
    setTimeout(() => {
      const item = memoItems.find(i => i.id === id);
      if (item) { item.deleted = true; saveMemo(); }
      renderMemoList();
    }, 280);
  }
}

renderAll();
</script>
</body>
</html>
